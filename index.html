<!DOCTYPE html>
<html lang="en">
  <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>PCA ECC Credit System</title>
      <meta name="description" content="PCA ECC Enterprise Credit & Grocery Loan Management System">
      <style>
                * { margin: 0; padding: 0; box-sizing: border-box; }
                body, html {
                              width: 100%;
                              height: 100vh;
                              overflow: hidden;
                              background: #0f172a;
                }
                iframe {
                              width: 100%;
                              height: 100vh;
                              border: none;
                              display: block;
                }
            </style>
  </head>
  <body>
        <iframe
                  id="appFrame"
                  src="https://script.google.com/macros/s/AKfycbwTD8UDvhGgys55iw10CbUKM56m2jltSHz8Oh7ni03Tn5tSKowjs3XVuZtHkEYIpRS76A/exec"
                  allow="camera; microphone; fullscreen"
                  loading="eager">
        </iframe>iframe>

        <script>
                  // Trigger Fullscreen on first user interaction
                  const triggerFullscreen = () => {
                                const docElm = document.documentElement;
                                const request = docElm.requestFullscreen || docElm.mozRequestFullScreen || docElm.webkitRequestFullscreen || docElm.msRequestFullscreen;
                                if (request) {
                                                  request.call(docElm).catch(e => console.log('Fullscreen blocked:', e));
                                }
                                // Remove listeners
                                window.removeEventListener('click', triggerFullscreen);
                                window.removeEventListener('touchstart', triggerFullscreen);
                  };

                  window.addEventListener('click', triggerFullscreen, { once: true });
                  window.addEventListener('touchstart', triggerFullscreen, { once: true });
        </script>
  </body>
</html>html>
        </script>
  </body>
      </style></title>
